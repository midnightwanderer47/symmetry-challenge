# Install: pre-commit install
# Requires: https://pre-commit.com (e.g. brew install pre-commit) and `just` on PATH.
default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: local
    hooks:
      - id: dart-format-check
        name: just check-format
        entry: just check-format
        language: system
        stages: [pre-commit, pre-push]
        pass_filenames: false
        always_run: true
